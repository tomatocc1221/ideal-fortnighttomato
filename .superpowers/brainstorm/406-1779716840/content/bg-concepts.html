<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e8e8e8; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; padding: 32px; }
  h2 { font-size: 1.8em; color: #cfae5a; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 32px; }
  .demo-row { display: flex; gap: 24px; margin-bottom: 36px; flex-wrap: wrap; }
  .demo-card { flex: 1; min-width: 340px; background: #111; border-radius: 16px; overflow: hidden; border: 1px solid #262626; }
  .demo-label { padding: 14px 20px; font-weight: 700; font-size: 1.05em; border-bottom: 1px solid #262626; display: flex; align-items: center; gap: 10px; }
  .demo-label .badge { background: #cfae5a; color: #0d0d0d; padding: 2px 10px; border-radius: 20px; font-size: 0.75em; }
  .demo-stage { position: relative; height: 380px; background: #0d0d0d; overflow: hidden; }

  /* Overlaid content simulating hero text */
  .hero-foreground { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 10; pointer-events: none; }
  .hero-foreground .logo-sim { width: 70px; height: 70px; background: radial-gradient(circle at 40% 40%, #cfae5a, #5a3e1a); border-radius: 50%; margin-bottom: 14px; box-shadow: 0 0 40px rgba(207,174,90,0.4); }
  .hero-foreground .title-sim { font-family: "Bebas Neue", sans-serif; font-size: 36px; color: #cfae5a; letter-spacing: 0.12em; text-shadow: 0 0 30px rgba(207,174,90,0.3); }
  .hero-foreground .sub-sim { color: #999; margin-top: 6px; font-size: 0.95em; }

  /* ===== CONCEPT 1: Tactical Flow Grid ===== */
  .tactical-bg { position: absolute; inset: 0; }
  .tactical-bg canvas { width: 100%; height: 100%; }
  .pitch-lines { position: absolute; inset: 0; opacity: 0.06; background:
    linear-gradient(0deg, transparent 49.5%, #cfae5a 49.5%, #cfae5a 50.5%, transparent 50.5%) 0 0 / 60px 60px,
    linear-gradient(90deg, transparent 49.5%, #cfae5a 49.5%, #cfae5a 50.5%, transparent 50.5%) 0 0 / 60px 60px;
  animation: gridShift 20s linear infinite; }
  @keyframes gridShift { 0% { background-position: 0 0, 0 0; } 100% { background-position: 60px 60px, 60px 60px; } }
  .tactical-dots { position: absolute; inset: 0; }
  .t-dot { position: absolute; width: 5px; height: 5px; border-radius: 50%; background: #cfae5a; box-shadow: 0 0 8px rgba(207,174,90,0.5); }
  .t-dot:nth-child(1) { left: 20%; top: 30%; animation: dotDrift1 8s ease-in-out infinite; }
  .t-dot:nth-child(2) { left: 60%; top: 50%; animation: dotDrift2 10s ease-in-out infinite; }
  .t-dot:nth-child(3) { left: 80%; top: 25%; animation: dotDrift3 7s ease-in-out infinite; }
  .t-dot:nth-child(4) { left: 35%; top: 65%; animation: dotDrift1 9s ease-in-out infinite; }
  .t-dot:nth-child(5) { left: 50%; top: 20%; animation: dotDrift2 11s ease-in-out infinite; }
  .t-dot:nth-child(6) { left: 70%; top: 70%; animation: dotDrift3 8.5s ease-in-out infinite; }
  .t-dot:nth-child(7) { left: 15%; top: 75%; animation: dotDrift1 10.5s ease-in-out infinite; }
  .t-dot:nth-child(8) { left: 45%; top: 85%; animation: dotDrift2 7.5s ease-in-out infinite; }
  .t-dot:nth-child(9) { left: 85%; top: 55%; animation: dotDrift3 9.5s ease-in-out infinite; }
  .t-dot:nth-child(10) { left: 25%; top: 45%; animation: dotDrift1 8.8s ease-in-out infinite; }
  .t-dot:nth-child(11) { left: 55%; top: 10%; animation: dotDrift2 11.5s ease-in-out infinite; }
  @keyframes dotDrift1 { 0%,100% { transform: translate(0,0); opacity: 0.4; } 25% { transform: translate(30px,-20px); opacity: 0.9; } 50% { transform: translate(50px,10px); opacity: 0.5; } 75% { transform: translate(20px,30px); opacity: 0.8; } }
  @keyframes dotDrift2 { 0%,100% { transform: translate(0,0); opacity: 0.5; } 33% { transform: translate(-40px,-10px); opacity: 0.9; } 66% { transform: translate(-20px,25px); opacity: 0.4; } }
  @keyframes dotDrift3 { 0%,100% { transform: translate(0,0); opacity: 0.3; } 20% { transform: translate(15px,35px); opacity: 0.8; } 50% { transform: translate(-25px,-15px); opacity: 0.9; } 80% { transform: translate(-10px,-30px); opacity: 0.5; } }
  .pass-line { position: absolute; height: 1px; background: linear-gradient(90deg, transparent, rgba(207,174,90,0.3), transparent); transform-origin: left center; animation: passFlash 4s ease-in-out infinite; }
  .pass-line:nth-child(12) { left: 20%; top: 30%; width: 200px; animation-delay: 0s; }
  .pass-line:nth-child(13) { left: 60%; top: 50%; width: 120px; transform: rotate(30deg); animation-delay: 1.5s; }
  .pass-line:nth-child(14) { left: 35%; top: 65%; width: 160px; transform: rotate(-20deg); animation-delay: 3s; }
  @keyframes passFlash { 0%,100% { opacity: 0; } 30% { opacity: 0.7; } 60% { opacity: 0; } }

  /* ===== CONCEPT 2: Constellation / Trophy Particles ===== */
  .const-bg { position: absolute; inset: 0; }
  .star { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: #cfae5a; animation: starTwinkle 3s ease-in-out infinite; }
  .star:nth-child(1) { left: 15%; top: 20%; animation-delay: 0s; }
  .star:nth-child(2) { left: 25%; top: 35%; animation-delay: 0.4s; }
  .star:nth-child(3) { left: 35%; top: 28%; animation-delay: 0.8s; }
  .star:nth-child(4) { left: 42%; top: 15%; animation-delay: 1.2s; }
  .star:nth-child(5) { left: 50%; top: 22%; animation-delay: 1.6s; }
  .star:nth-child(6) { left: 58%; top: 18%; animation-delay: 0.2s; }
  .star:nth-child(7) { left: 65%; top: 32%; animation-delay: 0.6s; }
  .star:nth-child(8) { left: 72%; top: 24%; animation-delay: 1.0s; }
  .star:nth-child(9) { left: 78%; top: 38%; animation-delay: 1.4s; }
  .star:nth-child(10) { left: 85%; top: 20%; animation-delay: 0.3s; }
  .star:nth-child(11) { left: 20%; top: 55%; animation-delay: 0.7s; width: 3px; height: 3px; }
  .star:nth-child(12) { left: 30%; top: 60%; animation-delay: 1.1s; width: 3px; height: 3px; }
  .star:nth-child(13) { left: 40%; top: 50%; animation-delay: 1.5s; width: 3px; height: 3px; }
  .star:nth-child(14) { left: 48%; top: 58%; animation-delay: 0.1s; }
  .star:nth-child(15) { left: 55%; top: 52%; animation-delay: 0.5s; }
  .star:nth-child(16) { left: 62%; top: 62%; animation-delay: 0.9s; }
  .star:nth-child(17) { left: 70%; top: 55%; animation-delay: 1.3s; }
  .star:nth-child(18) { left: 80%; top: 58%; animation-delay: 1.7s; }
  @keyframes starTwinkle { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(2); } }
  .trophy-constellation { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 180px; height: 220px; opacity: 0.12; }
  .trophy-constellation .line { position: absolute; height: 1px; background: #cfae5a; transform-origin: left center; }
  .connector { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: #cfae5a; box-shadow: 0 0 6px rgba(207,174,90,0.6); animation: nodePulse 2s ease-in-out infinite; }
  @keyframes nodePulse { 0%,100% { box-shadow: 0 0 3px rgba(207,174,90,0.3); } 50% { box-shadow: 0 0 15px rgba(207,174,90,0.8); } }

  /* ===== CONCEPT 3: Hexagon Football Mesh ===== */
  .hex-bg { position: absolute; inset: 0; overflow: hidden; }
  .hex-row { display: flex; justify-content: center; margin-top: -12px; }
  .hex { width: 50px; height: 57px; background: transparent; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); border: 1px solid rgba(207,174,90,0.06); flex-shrink: 0; margin: 0 2px; transition: all 1.5s ease; }
  .hex.glow { border-color: rgba(207,174,90,0.35); background: rgba(207,174,90,0.04); box-shadow: inset 0 0 20px rgba(207,174,90,0.08); }
  .hex-glow-wave { animation: hexWave 4s ease-in-out infinite; }
  @keyframes hexWave { 0%,100% { border-color: rgba(207,174,90,0.06); background: transparent; box-shadow: none; } 25% { border-color: rgba(207,174,90,0.3); background: rgba(207,174,90,0.03); box-shadow: inset 0 0 15px rgba(207,174,90,0.06); } 50% { border-color: rgba(207,174,90,0.06); background: transparent; box-shadow: none; } }

  /* ===== CONCEPT 4: Fluid Golden Smoke / Ink ===== */
  .fluid-bg { position: absolute; inset: 0; background: #0d0d0d; overflow: hidden; }
  .fluid-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.08; animation: orbFloat 12s ease-in-out infinite; }
  .fluid-orb:nth-child(1) { width: 400px; height: 400px; background: radial-gradient(circle, #cfae5a, transparent 70%); left: -10%; top: -20%; animation-delay: 0s; }
  .fluid-orb:nth-child(2) { width: 350px; height: 350px; background: radial-gradient(circle, #8b6914, transparent 70%); right: -5%; top: 30%; animation-delay: -4s; }
  .fluid-orb:nth-child(3) { width: 300px; height: 300px; background: radial-gradient(circle, #c9a961, transparent 70%); left: 40%; bottom: -20%; animation-delay: -8s; }
  @keyframes orbFloat { 0%,100% { transform: translate(0,0) scale(1); } 25% { transform: translate(60px,-40px) scale(1.2); } 50% { transform: translate(-30px,30px) scale(0.9); } 75% { transform: translate(-50px,-20px) scale(1.1); } }
</style>
