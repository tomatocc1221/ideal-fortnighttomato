<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日说法 — 球队二维码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    min-height: 100vh; gap: 14px; padding: 20px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .loading { color: #c9a961; font-size: 0.95rem; letter-spacing: 0.1em; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #output { display: none; max-width: 420px; width: 100%; box-shadow: 0 0 60px rgba(201,169,97,0.1), 0 20px 50px rgba(0,0,0,0.5); }
  .tip { color: #666; font-size: 0.75rem; letter-spacing: 0.05em; display: none; }
</style>
</head>
<body>
<div class="loading" id="loading">生成中...</div>
<img id="output" alt="今日说法球队二维码">
<div class="tip" id="tip">长按保存图片 · 发到群里扫码访问</div>

<script>
var URL = 'https://tomatocc1221.github.io/ideal-fortnighttomato/';

var qr = new Image(); qr.crossOrigin = 'anonymous';
qr.onload = draw; qr.onerror = function(){ document.getElementById('loading').textContent='加载失败，请刷新'; };
qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=350x350&color=0d0d0d&bgcolor=ffffff&margin=15&data=' + encodeURIComponent(URL);

var logo = new Image(); logo.crossOrigin = 'anonymous'; logo.src = 'images/logo.jpg';
var L = false; logo.onload = function(){ L = true; };

function roundRect(x, cx, cy, w, h, r) {
  x.beginPath(); x.moveTo(cx + r, cy); x.lineTo(cx + w - r, cy);
  x.arcTo(cx + w, cy, cx + w, cy + r, r); x.lineTo(cx + w, cy + h - r);
  x.arcTo(cx + w, cy + h, cx + w - r, cy + h, r); x.lineTo(cx + r, cy + h);
  x.arcTo(cx, cy + h, cx, cy + h - r, r); x.lineTo(cx, cy + r);
  x.arcTo(cx, cy, cx + r, cy, r); x.closePath();
}

function draw() {
  var S = 3, W = 420 * S, H = 600 * S;
  var c = document.createElement('canvas');
  c.width = W; c.height = H;
  var x = c.getContext('2d');

  // BG
  x.fillStyle = '#0a0a0a'; x.fillRect(0, 0, W, H);

  // Card area
  var cx = 16 * S, cy = 12 * S, cw = W - cx * 2, ch = H - cy * 2;

  // Card shadow
  x.shadowColor = 'rgba(0,0,0,0.6)'; x.shadowBlur = 30 * S; x.shadowOffsetX = 0; x.shadowOffsetY = 12 * S;
  x.fillStyle = '#111';
  roundRect(x, cx, cy, cw, ch, 18 * S); x.fill();
  x.shadowColor = 'transparent'; x.shadowBlur = 0; x.shadowOffsetY = 0;

  // Gold border
  x.strokeStyle = '#c9a961'; x.lineWidth = 2 * S;
  roundRect(x, cx, cy, cw, ch, 18 * S); x.stroke();

  // Inner thin border
  x.strokeStyle = 'rgba(201,169,97,0.25)'; x.lineWidth = 1 * S;
  roundRect(x, cx + 8 * S, cy + 8 * S, cw - 16 * S, ch - 16 * S, 14 * S); x.stroke();

  // ── Header ──
  var hy = cy + 40 * S;
  if (L) {
    var lr = 26 * S, lx = cx + 34 * S, ly = hy - lr;
    x.save(); x.beginPath(); x.arc(lx + lr, ly + lr, lr + 2, 0, Math.PI * 2); x.clip();
    x.drawImage(logo, lx - 2, ly - 2, (lr + 2) * 2, (lr + 2) * 2); x.restore();
    x.strokeStyle = '#c9a961'; x.lineWidth = 2 * S;
    x.beginPath(); x.arc(lx + lr, ly + lr, lr + 3, 0, Math.PI * 2); x.stroke();
  }

  x.fillStyle = '#c9a961'; x.textAlign = 'center';
  x.font = '800 ' + (20 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('今日说法足球俱乐部', W / 2, hy + 10 * S);

  x.fillStyle = '#888';
  x.font = (9 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('JIN RI SHUO FA F.C.  ·  以球会友', W / 2, hy + 28 * S);

  // ── Divider ──
  var dy = hy + 48 * S;
  x.strokeStyle = 'rgba(201,169,97,0.2)'; x.lineWidth = 1 * S;
  x.beginPath(); x.moveTo(cx + 40 * S, dy); x.lineTo(cx + cw - 40 * S, dy); x.stroke();

  // ── QR Code ──
  var qs = 300 * S, qx = cx + (cw - qs) / 2, qy = dy + 24 * S;

  // QR shadow panel
  x.fillStyle = '#1a1a1a';
  roundRect(x, qx - 16 * S, qy - 16 * S, qs + 32 * S, qs + 32 * S, 14 * S); x.fill();

  // White area
  x.fillStyle = '#fff';
  roundRect(x, qx - 12 * S, qy - 12 * S, qs + 24 * S, qs + 24 * S, 10 * S); x.fill();

  // Gold glow ring
  x.strokeStyle = '#c9a961'; x.lineWidth = 3 * S;
  x.shadowColor = 'rgba(201,169,97,0.45)'; x.shadowBlur = 16 * S;
  roundRect(x, qx - 12 * S - 2, qy - 12 * S - 2, qs + 24 * S + 4, qs + 24 * S + 4, 12 * S); x.stroke();
  x.shadowColor = 'transparent'; x.shadowBlur = 0;

  x.drawImage(qr, qx, qy, qs, qs);

  // ── Center logo on QR ──
  if (L) {
    var clr = 24 * S, clx = qx + qs / 2 - clr, cly = qy + qs / 2 - clr;
    x.fillStyle = '#fff';
    roundRect(x, clx - 4 * S, cly - 4 * S, clr * 2 + 8 * S, clr * 2 + 8 * S, 6 * S); x.fill();
    x.save(); x.beginPath(); x.arc(qx + qs / 2, qy + qs / 2, clr, 0, Math.PI * 2); x.clip();
    x.drawImage(logo, clx, cly, clr * 2, clr * 2); x.restore();
    x.strokeStyle = '#c9a961'; x.lineWidth = 1.5 * S;
    x.beginPath(); x.arc(qx + qs / 2, qy + qs / 2, clr + 1, 0, Math.PI * 2); x.stroke();
  }

  // ── Scan text ──
  x.fillStyle = '#c9a961'; x.textAlign = 'center';
  x.font = '600 ' + (10 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('微信扫码  ·  访问球队官网', W / 2, qy + qs + 36 * S);

  // ── Bottom info ──
  var by = qy + qs + 68 * S;
  x.strokeStyle = 'rgba(201,169,97,0.15)'; x.lineWidth = 1 * S;
  x.beginPath(); x.moveTo(cx + 50 * S, by); x.lineTo(cx + cw - 50 * S, by); x.stroke();

  x.fillStyle = '#777';
  x.font = (8.5 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('2025年3月30日成立于重庆溉澜溪体育公园', W / 2, by + 18 * S);
  x.fillText('每周六下午  ·  欢迎热爱足球的朋友加入', W / 2, by + 32 * S);

  // Show
  var url = c.toDataURL('image/jpeg', 0.93);
  var out = document.getElementById('output');
  out.src = url; out.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('tip').style.display = 'block';
}
</script>
</body>
</html>
