<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日说法 - 球队二维码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      padding: 20px;
    }

    .qr-card {
      background: linear-gradient(145deg, #1a1a1a 0%, #111 100%);
      border: 2px solid #c9a961;
      border-radius: 24px;
      padding: 48px 40px 36px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      position: relative;
      box-shadow:
        0 0 60px rgba(201,169,97,0.15),
        0 20px 60px rgba(0,0,0,0.5);
    }

    /* 装饰角标 */
    .qr-card::before {
      content: "⚽";
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      background: #0d0d0d;
      padding: 0 16px;
    }

    .qr-card::after {
      content: "";
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a961, transparent);
    }

    .qr-header {
      margin-bottom: 24px;
    }

    .qr-team-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #c9a961;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .qr-team-sub {
      font-size: 0.78rem;
      color: #888;
      letter-spacing: 0.12em;
    }

    /* QR 码容器 */
    .qr-code-wrapper {
      display: inline-block;
      background: #fff;
      padding: 16px;
      border-radius: 16px;
      margin: 0 auto 28px;
      position: relative;
      box-shadow: 0 0 30px rgba(201,169,97,0.25);
    }

    /* 金色边框环 */
    .qr-code-wrapper::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 19px;
      border: 2px solid #c9a961;
      pointer-events: none;
    }

    #qrcode {
      display: flex;
      justify-content: center;
    }

    #qrcode img,
    #qrcode canvas {
      display: block;
      width: 220px;
      height: 220px;
    }

    .qr-url {
      font-size: 0.72rem;
      color: #666;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
      word-break: break-all;
    }

    .qr-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding-top: 16px;
      border-top: 1px solid rgba(201,169,97,0.2);
    }

    .qr-footer-icon {
      font-size: 24px;
    }

    .qr-footer-logo {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid #c9a961;
    }

    .qr-footer-text {
      font-size: 0.78rem;
      color: #999;
      letter-spacing: 0.06em;
    }

    /* 下载按钮 */
    .qr-download-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 32px;
      background: transparent;
      color: #c9a961;
      border: 1.5px solid #c9a961;
      border-radius: 24px;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
    }

    .qr-download-btn:hover {
      background: #c9a961;
      color: #0d0d0d;
    }

    /* 底部装饰线 */
    .qr-ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      color: #555;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }

    .qr-ornament::before,
    .qr-ornament::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,97,0.3), transparent);
    }

    @media (max-width: 480px) {
      .qr-card {
        padding: 36px 24px 28px;
      }
      #qrcode img,
      #qrcode canvas {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>

  <div class="qr-card">
    <div class="qr-header">
      <div class="qr-team-name">今日说法足球俱乐部</div>
      <div class="qr-team-sub">JIN RI SHUO FA F.C.</div>
    </div>

    <div class="qr-code-wrapper">
      <img id="qrcodeImg" src="" alt="QR Code" width="220" height="220" style="display:block;">
    </div>

    <div class="qr-url">tomatocc1221.github.io/ideal-fortnighttomato</div>

    <div class="qr-footer">
      <img src="images/logo.jpg" alt="队徽" class="qr-footer-logo" id="footerLogo" style="width:40px;height:40px;">
    </div>

    <button class="qr-download-btn" id="downloadBtn">保存二维码图片</button>

    <div class="qr-ornament">扫码访问球队官网</div>
  </div>

  <script>
    const siteUrl = "https://tomatocc1221.github.io/ideal-fortnighttomato/";
    const qrApiUrl = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=0d0d0d&bgcolor=ffffff&data=" + encodeURIComponent(siteUrl);

    // 直接设置图片源
    document.getElementById("qrcodeImg").src = qrApiUrl;

    // 下载功能
    document.getElementById("downloadBtn").addEventListener("click", () => {
      const qrImg = document.getElementById("qrcodeImg");
      if (!qrImg.complete || qrImg.naturalWidth === 0) {
        alert("二维码还在加载中，请稍后再试");
        return;
      }
      downloadPNG(qrImg);
    });

    function downloadPNG(qrImg) {
      const scale = 3;
      const padding = 40 * scale;
      const size = 220 * scale;
      const totalSize = size + padding * 2;

      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = totalSize;
      exportCanvas.height = totalSize + 100 * scale;
      const ctx = exportCanvas.getContext("2d");

      // 背景
      ctx.fillStyle = "#1a1a1a";
      ctx.beginPath();
      ctx.roundRect(0, 0, totalSize, totalSize + 100 * scale, 24 * scale);
      ctx.fill();

      // 金色边框
      ctx.strokeStyle = "#c9a961";
      ctx.lineWidth = 2 * scale;
      ctx.beginPath();
      ctx.roundRect(2 * scale, 2 * scale, totalSize - 4 * scale, totalSize + 100 * scale - 4 * scale, 24 * scale);
      ctx.stroke();

      // QR 码白色背景
      const qrX = padding;
      const qrY = padding;
      const qrBgSize = size + 16 * scale;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.roundRect(qrX - 4 * scale, qrY - 4 * scale, qrBgSize + 8 * scale, qrBgSize + 8 * scale, 8 * scale);
      ctx.fill();

      // 金色细边框
      ctx.strokeStyle = "#c9a961";
      ctx.lineWidth = 1.5 * scale;
      ctx.beginPath();
      ctx.roundRect(qrX - 3 * scale, qrY - 3 * scale, qrBgSize + 6 * scale, qrBgSize + 6 * scale, 8 * scale);
      ctx.stroke();

      // 绘制 QR 码
      ctx.drawImage(qrImg, qrX + 8 * scale, qrY + 8 * scale, size - 16 * scale, size - 16 * scale);

      // 标题文字
      const textY = qrY + qrBgSize + 30 * scale;
      ctx.fillStyle = "#c9a961";
      ctx.font = `bold ${14 * scale}px "PingFang SC", "Microsoft YaHei", sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText("今日说法足球俱乐部", totalSize / 2, textY);

      // 绘制队徽
      const logoImg = document.getElementById("footerLogo");
      if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
        const logoSize = 24 * scale;
        const logoX = totalSize / 2 - logoSize / 2;
        const logoY = textY + 8 * scale;
        ctx.save();
        ctx.beginPath();
        ctx.arc(totalSize / 2, logoY + logoSize / 2, logoSize / 2, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(logoImg, logoX, logoY, logoSize, logoSize);
        ctx.restore();
        ctx.strokeStyle = "#c9a961";
        ctx.lineWidth = 1.5 * scale;
        ctx.beginPath();
        ctx.arc(totalSize / 2, logoY + logoSize / 2, logoSize / 2, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "#888";
        ctx.font = `${9 * scale}px "PingFang SC", "Microsoft YaHei", sans-serif`;
        ctx.fillText("扫码访问球队官网 · 以球会友", totalSize / 2, logoY + logoSize + 18 * scale);
      } else {
        ctx.fillStyle = "#888";
        ctx.font = `${9 * scale}px "PingFang SC", "Microsoft YaHei", sans-serif`;
        ctx.fillText("扫码访问球队官网 · 以球会友", totalSize / 2, textY + 22 * scale);
      }

      const link = document.createElement("a");
      link.download = "今日说法足球俱乐部_二维码.png";
      link.href = exportCanvas.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
