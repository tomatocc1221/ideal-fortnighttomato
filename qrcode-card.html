<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日说法 — 球队二维码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    min-height: 100vh; gap: 12px; padding: 20px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .loading { color: #c9a961; font-size: 0.95rem; letter-spacing: 0.08em; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #output { display: none; max-width: 420px; width: 100%; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
  .tip { color: #666; font-size: 0.72rem; letter-spacing: 0.05em; display: none; }
</style>
</head>
<body>
<div class="loading" id="loading">生成中...</div>
<img id="output" alt="今日说法球队二维码">
<div class="tip" id="tip">长按保存图片 · 发到群里扫码访问</div>

<script>
var SITE = 'https://tomatocc1221.github.io/ideal-fortnighttomato/';

var qr = new Image(); qr.crossOrigin = 'anonymous';
qr.onload = draw; qr.onerror = function(){ document.getElementById('loading').textContent='加载失败，请刷新'; };
qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=320x320&color=0d0d0d&bgcolor=ffffff&margin=16&data=' + encodeURIComponent(SITE);

var logo = new Image(); logo.crossOrigin = 'anonymous'; logo.src = 'images/logo.jpg';
var L = false; logo.onload = function(){ L = true; };

function rr(x, cx, cy, w, h, r) {
  x.beginPath(); x.moveTo(cx + r, cy); x.lineTo(cx + w - r, cy);
  x.arcTo(cx + w, cy, cx + w, cy + r, r); x.lineTo(cx + w, cy + h - r);
  x.arcTo(cx + w, cy + h, cx + w - r, cy + h, r); x.lineTo(cx + r, cy + h);
  x.arcTo(cx, cy + h, cx, cy + h - r, r); x.lineTo(cx, cy + r);
  x.arcTo(cx, cy, cx + r, cy, r); x.closePath();
}

function draw() {
  var S = 3, W = 420 * S, H = 620 * S;
  var c = document.createElement('canvas');
  c.width = W; c.height = H;
  var x = c.getContext('2d');

  // ── GRASS BACKGROUND ──
  // Deep green base
  x.fillStyle = '#0e2a0e'; x.fillRect(0, 0, W, H);

  // Grass blade strokes
  for (var i = 0; i < 3000; i++) {
    var gx = Math.random() * W, gy = Math.random() * H;
    var ga = (Math.random() - 0.5) * 0.3;
    var gl = 4 + Math.random() * 18 * S;
    var gc = Math.floor(10 + Math.random() * 35);
    x.strokeStyle = 'rgb(' + gc + ',' + (60 + Math.random() * 80) + ',' + gc + ')';
    x.lineWidth = 0.6 + Math.random() * 1.2;
    x.beginPath(); x.moveTo(gx, gy);
    x.lineTo(gx + Math.sin(ga) * gl, gy - gl); x.stroke();
  }

  // ── Pitch stripe pattern ──
  for (var si = 0; si < 12; si++) {
    var sx = (si / 12) * W;
    x.fillStyle = 'rgba(16,48,16,' + (0.12 + Math.abs(Math.sin(si * 2.1)) * 0.1) + ')';
    x.fillRect(sx, 0, W / 24, H);
  }

  // ── Center circle arc ──
  x.strokeStyle = 'rgba(255,255,255,0.04)'; x.lineWidth = 2 * S;
  x.beginPath(); x.arc(W / 2, H / 2, 180 * S, 0, Math.PI * 2); x.stroke();

  // ── Overlay fade (darker edges) ──
  var vignette = x.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.75);
  vignette.addColorStop(0, 'transparent'); vignette.addColorStop(1, 'rgba(0,0,0,0.65)');
  x.fillStyle = vignette; x.fillRect(0, 0, W, H);

  // ── CARD ──
  var cx = 18 * S, cy = 14 * S, cw = W - cx * 2, ch = H - cy * 2;
  x.fillStyle = 'rgba(8,8,8,0.92)';
  rr(x, cx, cy, cw, ch, 16 * S); x.fill();

  // Gold border
  x.strokeStyle = '#c9a961'; x.lineWidth = 2 * S;
  rr(x, cx, cy, cw, ch, 16 * S); x.stroke();

  // Inner accent line
  x.strokeStyle = 'rgba(201,169,97,0.2)'; x.lineWidth = 1 * S;
  rr(x, cx + 8 * S, cy + 8 * S, cw - 16 * S, ch - 16 * S, 12 * S); x.stroke();

  // ── Top: football icon + team name ──
  var hy = cy + 38 * S;
  // Soccer ball ASCII-style circle
  x.strokeStyle = '#c9a961'; x.fillStyle = 'rgba(201,169,97,0.08)'; x.lineWidth = 1.5 * S;
  var br = 16 * S, bx = cx + 36 * S, by = hy - br + 6 * S;
  x.beginPath(); x.arc(bx + br, by + br, br, 0, Math.PI * 2); x.fill(); x.stroke();
  // Pentagon center
  x.fillStyle = '#c9a961'; x.font = 'bold ' + (14 * S) + 'px sans-serif'; x.textAlign = 'center';
  x.fillText('⚽', bx + br, by + br + 5 * S);

  x.fillStyle = '#c9a961'; x.textAlign = 'left';
  x.font = '800 ' + (21 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('今日说法足球俱乐部', bx + br * 2 + 14 * S, hy + 4 * S);

  x.fillStyle = '#999';
  x.font = (9 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('JIN RI SHUO FA F.C.  ·  2025.03.30 成立', bx + br * 2 + 14 * S, hy + 20 * S);

  // ── Divider ──
  var dy = hy + 44 * S;
  x.strokeStyle = 'rgba(201,169,97,0.25)'; x.lineWidth = 1 * S;
  x.beginPath(); x.moveTo(cx + 30 * S, dy); x.lineTo(cx + cw - 30 * S, dy); x.stroke();

  // ── QR CODE ──
  var qs = 280 * S, qx = cx + (cw - qs) / 2, qy = dy + 20 * S;

  x.fillStyle = '#151515';
  rr(x, qx - 14 * S, qy - 14 * S, qs + 28 * S, qs + 28 * S, 12 * S); x.fill();

  x.fillStyle = '#fff';
  rr(x, qx - 10 * S, qy - 10 * S, qs + 20 * S, qs + 20 * S, 8 * S); x.fill();

  x.strokeStyle = '#c9a961'; x.lineWidth = 2.5 * S;
  x.shadowColor = 'rgba(201,169,97,0.4)'; x.shadowBlur = 12 * S;
  rr(x, qx - 10 * S - 2, qy - 10 * S - 2, qs + 20 * S + 4, qs + 20 * S + 4, 10 * S); x.stroke();
  x.shadowColor = 'transparent'; x.shadowBlur = 0;

  x.drawImage(qr, qx, qy, qs, qs);

  // ── Center logo on QR ──
  if (L) {
    var lr = 24 * S, lx = qx + qs / 2 - lr, ly = qy + qs / 2 - lr;
    x.fillStyle = '#fff';
    rr(x, lx - 3 * S, ly - 3 * S, lr * 2 + 6 * S, lr * 2 + 6 * S, 4 * S); x.fill();
    x.save(); x.beginPath(); x.arc(qx + qs / 2, qy + qs / 2, lr, 0, Math.PI * 2); x.clip();
    x.drawImage(logo, lx, ly, lr * 2, lr * 2); x.restore();
    x.strokeStyle = '#c9a961'; x.lineWidth = 1.5 * S;
    x.beginPath(); x.arc(qx + qs / 2, qy + qs / 2, lr + 1, 0, Math.PI * 2); x.stroke();
  }

  // ── Scan hint ──
  x.fillStyle = '#c9a961'; x.textAlign = 'center';
  x.font = '600 ' + (10 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('微信扫码  ·  访问球队官网', W / 2, qy + qs + 32 * S);

  // ── Bottom ──
  var by = qy + qs + 62 * S;
  x.strokeStyle = 'rgba(201,169,97,0.15)'; x.lineWidth = 1 * S;
  x.beginPath(); x.moveTo(cx + 50 * S, by); x.lineTo(cx + cw - 50 * S, by); x.stroke();

  x.fillStyle = '#888';
  x.font = (8.5 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('重庆溉澜溪体育公园 · 每周六下午', W / 2, by + 16 * S);
  x.fillText('用脚说话，以球会友', W / 2, by + 30 * S);

  // ── Small football decorations ──
  x.fillStyle = 'rgba(255,255,255,0.04)';
  x.font = (40 * S) + 'px sans-serif'; x.textAlign = 'center';
  x.fillText('⚽', cx + 30 * S, cy + ch - 16 * S);
  x.fillText('⚽', cx + cw - 30 * S, cy + ch - 16 * S);

  // Show
  var url = c.toDataURL('image/jpeg', 0.93);
  var out = document.getElementById('output');
  out.src = url; out.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('tip').style.display = 'block';
}
</script>
</body>
</html>
