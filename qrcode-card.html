<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日说法 — 球队二维码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    min-height: 100vh; gap: 12px; padding: 20px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .loading { color: #c9a961; font-size: 0.95rem; letter-spacing: 0.08em; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #output { display: none; max-width: 420px; width: 100%; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
  .tip { color: #666; font-size: 0.72rem; display: none; }
</style>
</head>
<body>
<div class="loading" id="loading">生成中...</div>
<img id="output" alt="今日说法球队二维码">
<div class="tip" id="tip">点击图片保存 · 发到群里扫码访问</div>

<script>
var SITE = 'https://tomatocc1221.github.io/ideal-fortnighttomato/';

var qr = new Image(); qr.crossOrigin = 'anonymous';
qr.onload = draw; qr.onerror = function(){ document.getElementById('loading').textContent='加载失败，请刷新'; };
qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=320x320&color=0d0d0d&bgcolor=ffffff&margin=16&data=' + encodeURIComponent(SITE);

var logo = new Image(); logo.crossOrigin = 'anonymous'; logo.src = 'images/logo.jpg';
var hasLogo = false; logo.onload = function(){ hasLogo = true; };

function rr(x, cx, cy, w, h, r) {
  x.beginPath(); x.moveTo(cx + r, cy); x.lineTo(cx + w - r, cy);
  x.arcTo(cx + w, cy, cx + w, cy + r, r); x.lineTo(cx + w, cy + h - r);
  x.arcTo(cx + w, cy + h, cx + w - r, cy + h, r); x.lineTo(cx + r, cy + h);
  x.arcTo(cx, cy + h, cx, cy + h - r, r); x.lineTo(cx, cy + r);
  x.arcTo(cx, cy, cx + r, cy, r); x.closePath();
}

function draw() {
  var S = 3, W = 420 * S, H = 600 * S;
  var c = document.createElement('canvas');
  c.width = W; c.height = H;
  var x = c.getContext('2d');

  x.fillStyle = '#080808'; x.fillRect(0, 0, W, H);

  // Card
  var cx = 18 * S, cy = 14 * S, cw = W - cx * 2, ch = H - cy * 2;
  x.fillStyle = '#0f0f0f';
  rr(x, cx, cy, cw, ch, 16 * S); x.fill();
  x.strokeStyle = '#c9a961'; x.lineWidth = 2 * S;
  rr(x, cx, cy, cw, ch, 16 * S); x.stroke();

  // Logo
  var hy = cy + 36 * S;
  if (hasLogo) {
    var lr = 24 * S, lx = cx + 30 * S, ly = hy - lr;
    x.save(); x.beginPath(); x.arc(lx + lr, ly + lr, lr + 2, 0, Math.PI * 2); x.clip();
    x.drawImage(logo, lx - 2, ly - 2, (lr + 2) * 2, (lr + 2) * 2); x.restore();
    x.strokeStyle = '#c9a961'; x.lineWidth = 2 * S;
    x.beginPath(); x.arc(lx + lr, ly + lr, lr + 3, 0, Math.PI * 2); x.stroke();
  }

  // Title
  x.fillStyle = '#c9a961'; x.textAlign = 'center';
  x.font = '800 ' + (20 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('今日说法足球俱乐部', W / 2 + (hasLogo ? 16 : 0) * S, hy + 8 * S);
  x.fillStyle = '#888';
  x.font = (9 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('JIN RI SHUO FA F.C.  ·  以球会友', W / 2 + (hasLogo ? 16 : 0) * S, hy + 24 * S);

  // Divider
  var dy = hy + 44 * S;
  x.strokeStyle = 'rgba(201,169,97,0.2)'; x.lineWidth = 1 * S;
  x.beginPath(); x.moveTo(cx + 40 * S, dy); x.lineTo(cx + cw - 40 * S, dy); x.stroke();

  // QR
  var qs = 290 * S, qx = cx + (cw - qs) / 2, qy = dy + 24 * S;

  x.fillStyle = '#191919';
  rr(x, qx - 14 * S, qy - 14 * S, qs + 28 * S, qs + 28 * S, 12 * S); x.fill();
  x.fillStyle = '#fff';
  rr(x, qx - 10 * S, qy - 10 * S, qs + 20 * S, qs + 20 * S, 8 * S); x.fill();

  x.strokeStyle = '#c9a961'; x.lineWidth = 2.5 * S;
  x.shadowColor = 'rgba(201,169,97,0.4)'; x.shadowBlur = 12 * S;
  rr(x, qx - 10 * S - 2, qy - 10 * S - 2, qs + 20 * S + 4, qs + 20 * S + 4, 10 * S); x.stroke();
  x.shadowColor = 'transparent'; x.shadowBlur = 0;

  x.drawImage(qr, qx, qy, qs, qs);

  // Center logo in QR
  if (hasLogo) {
    var clr = 22 * S, clx = qx + qs / 2 - clr, cly = qy + qs / 2 - clr;
    x.fillStyle = '#fff';
    rr(x, clx - 3 * S, cly - 3 * S, clr * 2 + 6 * S, clr * 2 + 6 * S, 4 * S); x.fill();
    x.save(); x.beginPath(); x.arc(qx + qs / 2, qy + qs / 2, clr, 0, Math.PI * 2); x.clip();
    x.drawImage(logo, clx, cly, clr * 2, clr * 2); x.restore();
    x.strokeStyle = '#c9a961'; x.lineWidth = 1.5 * S;
    x.beginPath(); x.arc(qx + qs / 2, qy + qs / 2, clr + 1, 0, Math.PI * 2); x.stroke();
  }

  // Hint
  x.fillStyle = '#c9a961'; x.textAlign = 'center';
  x.font = '600 ' + (10 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('微信扫码  ·  访问球队官网', W / 2, qy + qs + 32 * S);

  // Bottom
  var by = qy + qs + 62 * S;
  x.strokeStyle = 'rgba(201,169,97,0.15)'; x.lineWidth = 1 * S;
  x.beginPath(); x.moveTo(cx + 50 * S, by); x.lineTo(cx + cw - 50 * S, by); x.stroke();

  x.fillStyle = '#888';
  x.font = (8.5 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('2025.03.30 成立于重庆溉澜溪体育公园', W / 2, by + 16 * S);
  x.fillText('用脚说话，以球会友', W / 2, by + 30 * S);

  var url = c.toDataURL('image/jpeg', 0.93);
  var out = document.getElementById('output');
  out.src = url; out.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('tip').style.display = 'block';

  // Click image to download
  out.addEventListener('click', function() {
    var a = document.createElement('a');
    a.download = '今日说法_球队二维码.jpg';
    a.href = url;
    a.click();
  });
  // Also try auto-download
  setTimeout(function() {
    var a = document.createElement('a');
    a.download = '今日说法_球队二维码.jpg';
    a.href = url;
    a.click();
  }, 500);
}
</script>
</body>
</html>
