<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日说法 — 球队二维码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    min-height: 100vh; gap: 16px; padding: 20px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .loading { color: #c9a961; font-size: 1rem; letter-spacing: 0.1em; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .hint { color: #666; font-size: 0.8rem; letter-spacing: 0.06em; display: none; }
  #output { display: none; max-width: 400px; width: 100%; border-radius: 24px; box-shadow: 0 0 60px rgba(201,169,97,0.15), 0 24px 64px rgba(0,0,0,0.5); cursor: pointer; }
</style>
</head>
<body>
<div class="loading" id="loading">生成中...</div>
<img id="output" alt="今日说法球队二维码 · 长按或右键保存">
<div class="hint" id="hint">长按图片保存 · 发到群里大家扫码访问</div>

<script>
var siteUrl = 'https://tomatocc1221.github.io/ideal-fortnighttomato/';

var qrImg = new Image();
qrImg.crossOrigin = 'anonymous';
qrImg.onload = renderCard;
qrImg.onerror = function() {
  document.getElementById('loading').textContent = '加载失败，请刷新重试';
};
qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&color=0d0d0d&bgcolor=ffffff&margin=10&data=' + encodeURIComponent(siteUrl);

var logoImg = new Image();
logoImg.crossOrigin = 'anonymous';
logoImg.src = 'images/logo.jpg';
var logoReady = false;
logoImg.onload = function() { logoReady = true; };

function renderCard() {
  var S = 3, cw = 440 * S, ch = 640 * S;
  var c = document.createElement('canvas');
  c.width = cw; c.height = ch;
  var x = c.getContext('2d');

  // BG
  var g = x.createLinearGradient(0, 0, cw, ch);
  g.addColorStop(0, '#1a1a1a'); g.addColorStop(0.5, '#0f0f0f'); g.addColorStop(1, '#111');
  x.fillStyle = g;
  x.beginPath(); x.roundRect(0, 0, cw, ch, 24 * S); x.fill();

  // Border
  x.strokeStyle = 'rgba(201,169,97,0.3)'; x.lineWidth = 2 * S;
  x.beginPath(); x.roundRect(6, 6, cw - 12, ch - 12, 24 * S); x.stroke();

  // Logo
  if (logoReady) {
    var r = 30 * S, lx = 34 * S, ly = 28 * S;
    x.save(); x.beginPath(); x.arc(lx + r, ly + r, r + 3, 0, Math.PI * 2); x.clip();
    x.drawImage(logoImg, lx - 3, ly - 3, (r + 3) * 2, (r + 3) * 2); x.restore();
    x.strokeStyle = 'rgba(201,169,97,0.45)'; x.lineWidth = 2 * S;
    x.beginPath(); x.arc(lx + r, ly + r, r + 3, 0, Math.PI * 2); x.stroke();
  }

  // Title
  x.fillStyle = '#c9a961'; x.textAlign = 'center';
  x.font = 'bold ' + (22 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('今日说法足球俱乐部', cw / 2 + (logoReady ? 24 : 0) * S, 52 * S);
  x.fillStyle = '#888';
  x.font = (10 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('JIN RI SHUO FA F.C.', cw / 2 + (logoReady ? 24 : 0) * S, 68 * S);

  // QR
  var qs = 272 * S, qx = (cw - qs) / 2, qy = 100 * S, qp = 16 * S;
  x.fillStyle = '#fff';
  x.beginPath(); x.roundRect(qx - qp, qy - qp, qs + qp * 2, qs + qp * 2, 14 * S); x.fill();
  x.strokeStyle = '#c9a961'; x.lineWidth = 3 * S;
  x.shadowColor = 'rgba(201,169,97,0.35)'; x.shadowBlur = 14 * S;
  x.beginPath(); x.roundRect(qx - qp - 3, qy - qp - 3, qs + (qp + 3) * 2, qs + (qp + 3) * 2, 16 * S); x.stroke();
  x.shadowColor = 'transparent'; x.shadowBlur = 0;
  x.drawImage(qrImg, qx, qy, qs, qs);

  // Hint
  x.fillStyle = '#777';
  x.font = (9 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('微信扫码访问球队官网', cw / 2, qy + qs + qp + 32 * S);

  // Footer
  var dy = qy + qs + 72 * S;
  x.strokeStyle = 'rgba(201,169,97,0.15)'; x.lineWidth = 1 * S;
  x.beginPath(); x.moveTo(80 * S, dy); x.lineTo(cw - 80 * S, dy); x.stroke();
  x.fillStyle = '#666';
  x.font = (9 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('2025.03.30 成立于重庆溉澜溪体育公园', cw / 2, dy + 24 * S);
  x.fillText('以球会友 · 欢迎热爱足球的朋友加入', cw / 2, dy + 40 * S);

  // Show
  var dataUrl = c.toDataURL('image/jpeg', 0.92);
  var out = document.getElementById('output');
  out.src = dataUrl;
  out.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('hint').style.display = 'block';
}
</script>
</body>
</html>
