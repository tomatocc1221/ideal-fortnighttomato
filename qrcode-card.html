<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日说法 — 球队二维码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050505;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    min-height: 100vh; gap: 16px; padding: 20px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .loading { color: #c9a961; font-size: 1rem; letter-spacing: 0.1em; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .hint { color: #777; font-size: 0.78rem; letter-spacing: 0.06em; display: none; }
  #output { display: none; max-width: 440px; width: 100%; border-radius: 20px; box-shadow: 0 0 80px rgba(201,169,97,0.12), 0 30px 70px rgba(0,0,0,0.6); cursor: pointer; }
</style>
</head>
<body>
<div class="loading" id="loading">生成中...</div>
<img id="output" alt="今日说法 · 扫码访问球队官网">
<div class="hint" id="hint">长按图片保存 · 发到群里大家扫码</div>

<script>
var SITE = 'https://tomatocc1221.github.io/ideal-fortnighttomato/';

var qr = new Image(); qr.crossOrigin = 'anonymous';
qr.onload = draw; qr.onerror = function(){ document.getElementById('loading').textContent='加载失败，请刷新'; };
qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&color=0d0d0d&bgcolor=ffffff&margin=12&data=' + encodeURIComponent(SITE);

var logo = new Image(); logo.crossOrigin = 'anonymous';
logo.src = 'images/logo.jpg';
var hasLogo = false; logo.onload = function(){ hasLogo = true; };

function hexagon(x, cx, cy, r, sides) {
  x.beginPath();
  for (var i = 0; i < sides; i++) {
    var a = Math.PI * 2 / sides * i - Math.PI / 2;
    x.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  x.closePath();
}

function draw() {
  var S = 4, W = 400 * S, H = 600 * S;
  var c = document.createElement('canvas');
  c.width = W; c.height = H;
  var x = c.getContext('2d');

  // ── Deep background ──
  var bg = x.createRadialGradient(W / 2, H * 0.4, 0, W / 2, H * 0.4, H * 0.8);
  bg.addColorStop(0, '#1c1a10'); bg.addColorStop(0.6, '#0a0a0a'); bg.addColorStop(1, '#050505');
  x.fillStyle = bg; x.fillRect(0, 0, W, H);

  // ── Gold aura behind card ──
  var aura = x.createRadialGradient(W / 2, H * 0.45, H * 0.05, W / 2, H * 0.45, H * 0.55);
  aura.addColorStop(0, 'rgba(201,169,97,0.15)'); aura.addColorStop(0.5, 'rgba(201,169,97,0.04)'); aura.addColorStop(1, 'transparent');
  x.fillStyle = aura; x.fillRect(0, 0, W, H);

  // ── Card rect ──
  var mx = 24 * S, my = 18 * S, mw = W - mx * 2, mh = H - my * 2;
  var rnd = 22 * S;

  // ── Outer frame (double line) ──
  var frames = [
    { o: 0, c: 'rgba(201,169,97,0.15)', w: 4 * S },
    { o: 8 * S, c: 'rgba(201,169,97,0.28)', w: 2 * S }
  ];
  frames.forEach(function(f) {
    x.strokeStyle = f.c; x.lineWidth = f.w;
    x.beginPath(); x.roundRect(mx - f.o, my - f.o, mw + f.o * 2, mh + f.o * 2, rnd + f.o); x.stroke();
  });

  // Card fill
  x.fillStyle = '#0d0d0d';
  x.beginPath(); x.roundRect(mx, my, mw, mh, rnd); x.fill();

  // ── Gold corner shields ──
  var shield = 40 * S, sd = 2 * S;
  var corners = [[mx, my], [mx + mw - shield, my], [mx, my + mh - shield], [mx + mw - shield, my + mh - shield]];
  corners.forEach(function(cv) {
    x.fillStyle = 'rgba(201,169,97,0.06)'; x.strokeStyle = 'rgba(201,169,97,0.2)'; x.lineWidth = sd;
    x.beginPath(); x.roundRect(cv[0], cv[1], shield, shield, 10 * S); x.fill(); x.stroke();
  });

  // ── Top decorative line ──
  var tly = my + 78 * S;
  x.strokeStyle = 'rgba(201,169,97,0.18)'; x.lineWidth = 1 * S;
  x.beginPath(); x.moveTo(mx + 30 * S, tly); x.lineTo(mx + mw - 30 * S, tly); x.stroke();

  // ── Team badge (hexagon) ──
  var badgeCx = mx + 48 * S, badgeCy = my + 39 * S, badgeR = 32 * S;
  if (hasLogo) {
    x.save(); x.beginPath(); x.arc(badgeCx, badgeCy, badgeR, 0, Math.PI * 2); x.clip();
    x.drawImage(logo, badgeCx - badgeR, badgeCy - badgeR, badgeR * 2, badgeR * 2); x.restore();
  } else {
    x.fillStyle = 'rgba(201,169,97,0.1)'; x.beginPath(); x.arc(badgeCx, badgeCy, badgeR, 0, Math.PI * 2); x.fill();
  }
  x.strokeStyle = 'rgba(201,169,97,0.55)'; x.lineWidth = 2.5 * S;
  x.beginPath(); x.arc(badgeCx, badgeCy, badgeR + 2, 0, Math.PI * 2); x.stroke();

  // ── Title ──
  var tx = badgeCx + badgeR + 18 * S;
  x.fillStyle = '#c9a961'; x.textAlign = 'left';
  x.font = '800 ' + (22 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('今日说法', tx, my + 34 * S);
  x.fillStyle = '#ddd';
  x.font = '600 ' + (12 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('足球俱乐部  ·  JIN RI SHUO FA F.C.', tx, my + 52 * S);

  // ── QR Code ──
  var qs = 300 * S, qx = mx + (mw - qs) / 2, qy = my + 108 * S, qp = 20 * S;

  // QR background panel
  x.fillStyle = '#181818'; x.strokeStyle = 'rgba(201,169,97,0.08)'; x.lineWidth = 1.5 * S;
  x.beginPath(); x.roundRect(qx - qp, qy - qp, qs + qp * 2, qs + qp * 2, 16 * S); x.fill(); x.stroke();

  // QR white area
  var qInnerPad = 12 * S;
  x.fillStyle = '#fff';
  x.beginPath(); x.roundRect(qx - qInnerPad, qy - qInnerPad, qs + qInnerPad * 2, qs + qInnerPad * 2, 10 * S); x.fill();

  // QR glow ring
  x.strokeStyle = '#c9a961'; x.lineWidth = 4 * S;
  x.shadowColor = 'rgba(201,169,97,0.5)'; x.shadowBlur = 18 * S;
  x.beginPath(); x.roundRect(qx - qInnerPad - 3, qy - qInnerPad - 3, qs + (qInnerPad + 3) * 2, qs + (qInnerPad + 3) * 2, 12 * S); x.stroke();
  x.shadowColor = 'transparent'; x.shadowBlur = 0;

  // Draw QR
  x.drawImage(qr, qx, qy, qs, qs);

  // ── Team logo centered in QR ──
  if (hasLogo) {
    var lr = 22 * S, lcx = qx + qs / 2, lcy = qy + qs / 2;
    x.fillStyle = '#fff'; x.beginPath(); x.arc(lcx, lcy, lr + 4 * S, 0, Math.PI * 2); x.fill();
    x.save(); x.beginPath(); x.arc(lcx, lcy, lr, 0, Math.PI * 2); x.clip();
    x.drawImage(logo, lcx - lr, lcy - lr, lr * 2, lr * 2); x.restore();
    x.strokeStyle = '#c9a961'; x.lineWidth = 1.5 * S;
    x.beginPath(); x.arc(lcx, lcy, lr + 1, 0, Math.PI * 2); x.stroke();
  }

  // ── Scan hint text ──
  x.textAlign = 'center'; x.fillStyle = '#c9a961';
  x.font = '600 ' + (11 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  x.fillText('微信扫码访问球队官网', W / 2, qy + qs + qp + 24 * S);

  // ── Bottom divider ──
  var by = qy + qs + 68 * S;
  x.strokeStyle = 'rgba(201,169,97,0.15)'; x.lineWidth = 1 * S;
  x.beginPath(); x.moveTo(mx + 50 * S, by); x.lineTo(mx + mw - 50 * S, by); x.stroke();

  // ── Stats row ──
  x.fillStyle = '#aaa'; x.textAlign = 'center';
  x.font = (9 * S) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  var stats = ['2025.03.30 成立', '重庆溉澜溪', '以球会友'];
  var sx = mx + mw / 2, sy = by + 20 * S, gap = 110 * S;
  stats.forEach(function(s, i) {
    x.fillText(s, sx + (i - 1) * gap, sy);
  });

  // ── Bottom gold bar ──
  var barW = 80 * S, barH = 3 * S, barY = by + 36 * S;
  var barGrad = x.createLinearGradient(W / 2 - barW / 2, 0, W / 2 + barW / 2, 0);
  barGrad.addColorStop(0, 'transparent'); barGrad.addColorStop(0.5, '#c9a961'); barGrad.addColorStop(1, 'transparent');
  x.fillStyle = barGrad;
  x.fillRect(W / 2 - barW / 2, barY, barW, barH);

  // Show
  var dataUrl = c.toDataURL('image/jpeg', 0.94);
  var out = document.getElementById('output');
  out.src = dataUrl; out.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('hint').style.display = 'block';
}
</script>
</body>
</html>
